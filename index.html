<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>事業藍圖｜Team+</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<!-- Firebase SDK (compat - works in all browsers without module issues) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
// Show auth screen immediately so page is never blank
document.addEventListener('DOMContentLoaded', function() {
  var authScreen = document.getElementById('auth-screen');
  if (authScreen) authScreen.style.display = 'flex';
});

try {
const firebaseConfig = {
apiKey: “AIzaSyDk8hU_GYvI1FvuLjpUVdYtITZ2jomeDuo”,
authDomain: “hagi-business-app.firebaseapp.com”,
projectId: “hagi-business-app”,
storageBucket: “hagi-business-app.firebasestorage.app”,
messagingSenderId: “499920576099”,
appId: “1:499920576099:web:dbd294acbf9e7125eca256”
};
firebase.initializeApp(firebaseConfig);
const _auth = firebase.auth();
const _db   = firebase.firestore();

window._currentUser = null;

_auth.onAuthStateChanged(async (user) => {
if (user) {
window._currentUser = user;
document.getElementById(‘auth-screen’).style.display = ‘none’;
document.getElementById(‘app-wrap’).style.display    = ‘flex’;
document.getElementById(‘user-display-name’).textContent = user.displayName || user.email.split(’@’)[0];
document.getElementById(‘auth-email-header’).textContent = user.email;
if (typeof window._loadFromFirestore === ‘function’) {
await window._loadFromFirestore(user.uid);
}
} else {
window._currentUser = null;
document.getElementById(‘auth-screen’).style.display = ‘flex’;
document.getElementById(‘app-wrap’).style.display    = ‘none’;
}
});

window._doRegister = async () => {
const email = document.getElementById(‘auth-email’).value.trim();
const pass  = document.getElementById(‘auth-pass’).value;
const name  = document.getElementById(‘auth-display-name’).value.trim() || email.split(’@’)[0];
const err   = document.getElementById(‘auth-error’);
err.textContent = ‘’;
if (!email || !pass) { err.textContent = ‘請輸入信箱與密碼’; return; }
if (pass.length < 6)  { err.textContent = ‘密碼至少 6 位’; return; }
try {
const cred = await _auth.createUserWithEmailAndPassword(email, pass);
await cred.user.updateProfile({ displayName: name });
await _db.collection(‘users’).doc(cred.user.uid).set({ userName: name, createdAt: new Date().toISOString() });
} catch(e) { err.textContent = _authErrMsg(e.code); }
};

window._doLogin = async () => {
const email = document.getElementById(‘auth-email’).value.trim();
const pass  = document.getElementById(‘auth-pass’).value;
const err   = document.getElementById(‘auth-error’);
err.textContent = ‘’;
try {
await _auth.signInWithEmailAndPassword(email, pass);
} catch(e) { err.textContent = _authErrMsg(e.code); }
};

window._doLogout = async () => {
if (!confirm(‘確定登出？’)) return;
await _auth.signOut();
};

window._doForgot = async () => {
const email = document.getElementById(‘auth-email’).value.trim();
const err = document.getElementById(‘auth-error’);
if (!email) { err.textContent = ‘請先輸入信箱地址’; err.style.color = ‘#C05621’; return; }
try {
await _auth.sendPasswordResetEmail(email);
err.style.color = ‘#276749’;
err.textContent = ‘✅ 重設密碼信件已寄出，請查收信箱’;
} catch(e) { err.style.color = ‘#C53030’; err.textContent = _authErrMsg(e.code); }
};

} catch(e) {
// Firebase failed to load — show error on screen
document.addEventListener(‘DOMContentLoaded’, function() {
var err = document.getElementById(‘auth-error’);
if (err) { err.textContent = ‘Firebase 載入失敗：’ + e.message; err.style.color=’#C53030’; }
});
// provide stub so buttons don’t crash
window._doRegister = window._doLogin = window._doLogout = window._doForgot = async function() {
document.getElementById(‘auth-error’).textContent = ‘Firebase 尚未載入，請重新整理頁面’;
};
}

function _authErrMsg(code) {
const msgs = {
‘auth/email-already-in-use’: ‘此信箱已被註冊’,
‘auth/invalid-email’: ‘信箱格式不正確’,
‘auth/wrong-password’: ‘密碼錯誤’,
‘auth/user-not-found’: ‘找不到此帳號’,
‘auth/weak-password’: ‘密碼強度不足（至少6位）’,
‘auth/invalid-credential’: ‘信箱或密碼錯誤’,
‘auth/too-many-requests’: ‘嘗試次數過多，請稍後再試’,
‘auth/operation-not-allowed’: ‘請至 Firebase Console 開啟 Email/Password 登入’,
‘auth/network-request-failed’: ‘網路連線失敗，請檢查網路’,
};
return msgs[code] || `錯誤（${code}）`;
}

let _authMode = ‘login’;
window.switchAuthTab = function(mode) {
_authMode = mode;
document.getElementById(‘tab-login’).classList.toggle(‘on’, mode === ‘login’);
document.getElementById(‘tab-register’).classList.toggle(‘on’, mode === ‘register’);
document.getElementById(‘auth-register-fields’).style.display = mode === ‘register’ ? ‘flex’ : ‘none’;
document.getElementById(‘auth-submit-btn’).textContent = mode === ‘register’ ? ‘✦ 建立帳號’ : ‘登入’;
const err = document.getElementById(‘auth-error’);
err.textContent = ‘’; err.style.color = ‘#C53030’;
document.getElementById(‘forgot-link’).style.display = mode === ‘login’ ? ‘inline’ : ‘none’;
};

window._authSubmit = async function() {
const btn = document.getElementById(‘auth-submit-btn’);
btn.disabled = true;
btn.textContent = ‘處理中…’;
try {
if (_authMode === ‘register’) await window._doRegister();
else await window._doLogin();
} finally {
btn.disabled = false;
btn.textContent = _authMode === ‘register’ ? ‘✦ 建立帳號’ : ‘登入’;
}
};
</script>

    --purple-dark: #44337A;

  /* HEADER */
  .header { background: var(--white); border-bottom: 1px solid var(--purple-light); padding: 0 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(107,70,193,0.07); }
  .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; gap: 12px; }
  .brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .brand-icon { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, var(--purple-deep), var(--purple-mid)); display: flex; align-items: center; justify-content: center; color: white; font-size: 17px; }
  .brand-name { font-weight: 800; font-size: 14px; color: var(--purple-dark); }
  .brand-sub { font-size: 10px; color: var(--purple-mid); }
  .nav { display: flex; gap: 3px; overflow-x: auto; scrollbar-width: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nav-btn { padding: 7px 13px; border-radius: 9px; border: none; background: transparent; color: var(--gray-600); font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; transition: var(--tr); white-space: nowrap; display: flex; align-items: center; gap: 5px; }
  .nav-btn.active, .nav-btn:hover { background: var(--purple-pale); color: var(--purple-deep); }
  .nav-btn.active { font-weight: 800; }
  .founder-chip { display: flex; align-items: center; gap: 6px; background: var(--purple-pale); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--purple-deep); font-weight: 700; flex-shrink: 0; border: 1px solid var(--purple-light); }

  /* MAIN */
  .main { flex: 1; max-width: 1200px; margin: 0 auto; width: 100%; padding: 20px 14px; }
  .page { display: none; animation: fadeIn 0.28s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* CARDS */
  .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; transition: var(--tr); }
  .card:hover { box-shadow: var(--shadow-hover); }
  .card-title { font-size: 12px; font-weight: 800; color: var(--purple-deep); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .col-span-2 { grid-column: span 2; }
  .stack { display: flex; flex-direction: column; gap: 14px; }

  /* STAT CHIP */
  .stat-chip { background: var(--white); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); border-left: 4px solid var(--purple-mid); transition: var(--tr); }
  .stat-chip:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .stat-chip .label { font-size: 11px; color: var(--gray-400); font-weight: 600; margin-bottom: 5px; }
  .stat-chip .value { font-size: 26px; font-weight: 900; color: var(--purple-deep); line-height: 1; }
  .stat-chip .unit { font-size: 12px; color: var(--purple-mid); font-weight: 700; margin-left: 3px; }

  /* PROGRESS */
  .progress-wrap { margin-top: 6px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--gray-600); margin-bottom: 7px; }
  .progress-track { height: 10px; border-radius: 99px; background: var(--purple-light); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--purple-deep), var(--purple-mid)); transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
