<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>事業藍圖｜Team+</title>

<!-- Firebase SDK -->
<script type="module">
// ════════════════════════════
// FIREBASE INIT
// ════════════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs, addDoc, updateDoc, deleteDoc, query, where, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: “AIzaSyDk8hU_GYvI1FvuLjpUVdYtITZ2jomeDuo”,
authDomain: “hagi-business-app.firebaseapp.com”,
projectId: “hagi-business-app”,
storageBucket: “hagi-business-app.firebasestorage.app”,
messagingSenderId: “499920576099”,
appId: “1:499920576099:web:dbd294acbf9e7125eca256”,
measurementId: “G-WSXEXTT7EW”
};
const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

// ── Expose to global scope so main script can call ──
window._fb = { auth, db, doc, setDoc, getDoc, collection, getDocs, addDoc, updateDoc, deleteDoc, query, where, onSnapshot, signOut, onAuthStateChanged };

// ── Auth state listener ──
onAuthStateChanged(auth, async (user) => {
if (user) {
window._currentUser = user;
document.getElementById(‘auth-screen’).style.display = ‘none’;
document.getElementById(‘app-wrap’).style.display    = ‘flex’;
document.getElementById(‘user-display-name’).textContent = user.displayName || user.email.split(’@’)[0];
document.getElementById(‘auth-email-header’).textContent = user.email;
await window._loadFromFirestore(user.uid);
window._startListeners(user.uid);
} else {
window._currentUser = null;
document.getElementById(‘auth-screen’).style.display = ‘flex’;
document.getElementById(‘app-wrap’).style.display    = ‘none’;
}
});

// ── Auth actions ──
window._doRegister = async () => {
const email = document.getElementById(‘auth-email’).value.trim();
const pass  = document.getElementById(‘auth-pass’).value;
const name  = document.getElementById(‘auth-display-name’).value.trim() || email.split(’@’)[0];
const err   = document.getElementById(‘auth-error’);
err.textContent = ‘’;
if (!email || !pass) { err.textContent = ‘請輸入信箱與密碼’; return; }
if (pass.length < 6)  { err.textContent = ‘密碼至少 6 位’; return; }
try {
const cred = await createUserWithEmailAndPassword(auth, email, pass);
await updateProfile(cred.user, { displayName: name });
// create user profile doc
await setDoc(doc(db, ‘users’, cred.user.uid), { userName: name, createdAt: new Date().toISOString() });
} catch(e) {
err.textContent = _authErrMsg(e.code);
}
};
window._doLogin = async () => {
const email = document.getElementById(‘auth-email’).value.trim();
const pass  = document.getElementById(‘auth-pass’).value;
const err   = document.getElementById(‘auth-error’);
err.textContent = ‘’;
try {
await signInWithEmailAndPassword(auth, email, pass);
} catch(e) {
err.textContent = _authErrMsg(e.code);
}
};
window._doLogout = async () => {
if (!confirm(‘確定登出？’)) return;
await signOut(auth);
};

function _authErrMsg(code) {
const msgs = {
‘auth/email-already-in-use’: ‘此信箱已被註冊’,
‘auth/invalid-email’: ‘信箱格式不正確’,
‘auth/wrong-password’: ‘密碼錯誤’,
‘auth/user-not-found’: ‘找不到此帳號’,
‘auth/weak-password’: ‘密碼強度不足（至少6位）’,
‘auth/invalid-credential’: ‘信箱或密碼錯誤’,
‘auth/too-many-requests’: ‘嘗試次數過多，請稍後再試’,
};
return msgs[code] || ‘登入失敗：’ + code;
}
</script>
